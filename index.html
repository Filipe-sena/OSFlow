<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        body{
            background-color: rgb(32, 32, 32);
            font-family: "Roboto", sans-serif;
            min-height: 100vh;
        }
        .div-central{
            background-color: rgb(37, 35, 49);
            padding: 40px;
            margin: 40px auto;
            height: auto;
            width: 90%;
            max-width: 450px;
            border-radius: 20px;
            box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.5);
        } 
        form{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        label{
            width: 100%;
            text-align: left;
            color: #00b900;
            font-size: 0.9rem;
            margin-top: 15px;
        }
        input{
            background-color: rgb(45, 43, 58);
            color: white;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            box-sizing: border-box;
            border: 2px solid transparent;
            outline: none;
            transition: 0.3s;
        }
        input:focus{
            background-color: rgb(39, 39, 39);
            border-color: rgb(0, 185, 0);
        }
        textarea{
            background-color: rgb(45, 43, 58);
            color: white;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            box-sizing: border-box;
            resize: vertical;
            min-height: 80px;
            max-height: 300px;
            border: 2px solid transparent;
            outline: none;
            transition: 0.3s;
            margin-bottom: 15px;
        }
        textarea:focus{
            background-color: rgb(39, 39, 39);
            border-color: rgb(0, 185, 0);
        }
        .div-buttons{
            width: 100%;
            display: flex;
            gap: 15px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-family: "Roboto", sans-serif;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .btn:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }
        /* CORES DOS BOTÕES */
        .btn-save    { background-color: #2da44e; } /* Verde */
        .btn-delete  { background-color: #cf222e; } /* Vermelho */
        .btn-edit    { background-color: #d29922; } /* Laranja */
        .btn-neutral { background-color: #444c56; } /* Cinza */
        .hamburger {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            background: none;
            border: none;
            cursor: pointer;
        }
        .hamburger span{
            display: block;
            width: 30px;
            height: 3px;
            margin: 5px;
            background-color: white;
            transition: 0.4s ease;
        }
        .sidebar{
            position: fixed;
            top: 0px;
            left: 0px;
            width: 250px;
            height: 100%;
            background-color: #252331;
            transition: 0.4s ease;
            padding-top: 60px;
            transform: translateX(-100%);
            z-index: 1000;
        }
        .sidebar.active{
            transform: translateX(0);
        }
        .sidebar a{
            display: block;
            padding: 15px 25px;
            border: 3px solid transparent;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.4s;
        }
        .sidebar a:hover{
            background-color: #2b2b2b;
            padding-left: 35px;
        }
        .sidebar ul{
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sidebar li {
            width: 100%;
        }
        .titulo-pagina{
            margin-bottom: 30px;
            padding: 20px 0;
            background-color: #22202e;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            box-shadow: 0px 15px 30px rgba(0, 0, 0, 0.5);
        }
        .titulo-pagina h1{
            margin: 0;
            color: aliceblue;
            text-align: center;
            font-size: 1.8rem;
        }
        #container-clientes{
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            gap: 20px;
        }
        .card-cliente{
            background-color: #252331;
            color: white;
            flex: calc(33% - 30px);
            min-width: 250px;
            max-width: 350px;
            padding: 15px;
            margin: 20px;
            border-radius: 12px;
            box-sizing: border-box;
            border-left: 5px solid #19005f; /* Uma faixa lateral de cor */
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card-cliente:hover {
            transform: translateY(-5px);
            box-shadow: 0px 10px 20px rgba(0,0,0,0.4);
        }
        .card-cliente .btn, .div-os .btn {
            margin-top: 10px;
            width: 100%; /* Por padrão no mobile */
        }
        .div-busca{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .barra-busca{
            margin-top: 40px;
            margin-bottom: 30px;
            width: 30%;
            max-width: 400px;
        }
        select {
            background-color: rgb(45, 43, 58);
            color: white;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            box-sizing: border-box;
            border: 2px solid transparent;
            outline: none;
            cursor: pointer;
            appearance: none; /* Remove a seta padrão do navegador para alguns sistemas */
        }
        select:focus {
            border-color: rgb(0, 185, 0);
        }
        .div-aviso{
            background-color: #252331;
            border: 2px;
            border-color: rgb(190, 0, 0);
            border-radius: 12px;
            color: white;
            padding: 30px;
            margin: 0 auto;
        }
        #container-todas-os{
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
            padding: 20px;
            gap: 20px;
        }
        .div-os{
            background-color: #252331;
            color: white;
            padding: 20px;
            border-radius: 12px;
            flex: calc(25% - 30px);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            box-sizing: border-box;
            min-width: 250px;
            max-width: 350px;
        }
        .div-buttons-card {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 15px;
        }
        @media (max-width: 800px){
            .div-os{
                padding: 10px;
                min-width: 140px;
                flex: calc(50% - 20px);
            }
        }
    </style>
</head>
<body>
    <section id="tela-principal">
        <div class="titulo-pagina">
            <h1>Seja bem vindo ao OS Maker</h1>
        </div>
        
    </section>

    <section id="tela-cadastro" style="display: none;">
        <div class="titulo-pagina">
            <h1 style="text-align: center; color: aliceblue;">Cadastre um novo cliente!</h1>
        </div>
        <div id="perfil-cliente" class="div-central">
            <form id="form-cliente" action="">
                <label for="nome">Informações do cliente</label>
                <input type="text" id="nome" placeholder="Nome" required>
                <input type="text" id="descricao" placeholder="Descrição">
                <input type="number" id="cpf" placeholder="CPF">
                <label for="telefone">Informações para contato</label>
                <input type="tel" id="telefone" placeholder="Telefone" required>
                <input type="text" id="endereco" placeholder="Endereço">
                <div class="div-buttons">
                    <button type="reset" id="reset-button" class="btn btn-delete">Limpar</button>
                    <button type="submit" id="save-button" class="btn btn-save"> Salvar</button>
                </div>
            </form>
        </div>
    </section>

    <section id="tela-os" style="display: none;">
        <div class="titulo-pagina">
            <h1 style="color: white; text-align: center;">Ordem de Serviço</h1>
        </div>
   
        <div id="os" class="div-central">
            <form id="form-os" action="">
                <label for="select-status-os" style="text-align: center;">Status da Ordem de serviço</label>
                <select id="select-status-os" style="width: 200px; display: flex;">
                    <option value="orcamento">Em orçamento</option>
                    <option value="andamento">Em andamento</option>
                    <option value="pagamento">Aguardando pagamento</option>
                    <option value="concluido">Concluído</option>
                </select>
                <label for="select-clientes">Selecionar Cliente</label>
                <select id="select-clientes">
                    <option value="">Selecione um cliente</option>
                </select>
                <label for="produto">Descrição do produto</label>
                <input type="text" id="produto" placeholder="Produto" required>
                <textarea name="" id="observacao" placeholder="Oberservações" required></textarea>
                <label for="relato">Problema apresentado</label>
                <textarea name="" id="relato" placeholder="Relato do cliente" required></textarea>
                <textarea name="" id="laudo" placeholder="Laudo técnico"></textarea>
                <label for="valor">Valor a cobrar:</label>
                <input type="number" id="valor" placeholder="R$">
                <label for="data-recebimento">Data de recebimento</label>
                <input type="date" id="data-recebimento" required>
                <label for="data-entrega">Data prevista para entrega</label>
                <input id="data-entrega" type="date" required>
                <div class="div-buttons">
                    <button type="reset" id="reset-os" class="btn btn-delete">Limpar</button>
                    <button type="submit" id="save-os" class="btn btn-save">Salvar</button>
                </div>
            </form> 
        </div>
    </section>

    <section id="tela-lista-clientes" style="display: none;">
        <div class="titulo-pagina">
            <h1 style="color: white; text-align: center;">Lista de clientes</h1>
        </div>
        
        <div class="div-busca">
            <input type="text" class="barra-busca" id="barra-busca" placeholder="Busque por um cliente">
        </div>
        <div id="container-clientes"></div>
    </section>

    <section id="tela-historico" style="display: none;">
        <div class="titulo-pagina">
            <h1 id="titulo-historico">Histórico do cliente</h1>
        </div>
        <div id="container-historico" class="div-central"></div>
        <button class="btn btn-neutral" style="left: 100px; top: 100px; position: fixed;" onclick="voltarParaClientes()">Voltar</button>
    </section>

    <section id="tela-todas-os" style="display: none;">
        <div class="titulo-pagina">
            <h1>Exibindo todas as ordens de serviço</h1>
        </div>
        <select id="select-opcoes-2" style="width: 200px;">
            <option value="antiga">Mais antiga (Recebimento)</option>
            <option value="nova">Mais nova (Recebimento)</option>
            <option value="prazo">Prazo de entrega (Próximas)</option>
        </select>
        <select id="select-opcoes-exibicao" style="width: 200px;">
            <option value="todas">Todas OS</option>
            <option value="orcamento">Em orçamento</option>
            <option value="andamento">Em andamento</option>
            <option value="pagamento">Aguardando pagamento</option>
            <option value="concluido">Concluída</option>
        </select>
        <div id="container-todas-os"></div>        
    </section>

    <button id="menuButton" class="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </button>
    <nav id="sidebar" class="sidebar">
        <ul style="color: white;">
            <li><a id="link-principal" href="#">Tela principal</a></li>
            <li>
                <li><a id="btn-submenu-os" href="#" style="display: flex; justify-content: space-between;">
                    Ordem de serviço <span>▼</span>
                </a></li>
                <ul id="submenu-os" style="display: none; background-color: #1a1824;;">
                    <li><a id="link-os" href="#" style="padding-left: 50px; font-size: 0.9rem;">Cadastrar OS</a></li>
                    <li><a id="link-todas-os" href="#" style="padding-left: 50px; font-size: 0.9rem;">Todas as OS</a></li>
                </ul>
            </li>

            <li>
                <li><a id="btn-submenu-clientes" href="#">
                    Clientes <span>▼</span>
                </a></li>
                <ul id="submenu-clientes" style="display: none; background-color: #1a1824;">
                    <li><a id="link-cadastro" href="#" style="padding-left: 50px; font-size: 0.9rem;">Cadastrar cliente</a></li>
                    <li><a id="link-clientes" href="#" style="padding-left: 50px; font-size: 0.9rem;">Clientes cadastrados</a></li>
                </ul>
            </li>

        </ul>
    </nav>

    <script>
        const formOS = document.querySelector('#form-os');
        formOS.addEventListener('submit', async (evento) => {
            evento.preventDefault();
            
            let dadosOS = {
                status: document.querySelector('#select-status-os').value,
                cliente : document.querySelector('#select-clientes').value,
                produto : document.querySelector('#produto').value,
                observacao : document.querySelector('#observacao').value,
                relato : document.querySelector('#relato').value,
                laudo : document.querySelector('#laudo').value,
                dataRecebimento: document.querySelector('#data-recebimento').value,
                dataEntrega: document.querySelector('#data-entrega').value,
                valor : document.querySelector('#valor').value
            };

            if(editandoIndiceOs !== null){
                try{
                    const resposta = await fetch(`http://localhost:3000/os/${editandoIndiceOs}`, {
                        method : 'PUT',
                        headers:{
                            'Content-type':'application/json'
                        },
                        body: JSON.stringify(dadosOS)
                    })

                    if(resposta.ok){
                        alert(`A OS do produto ${dadosOS.produto} foi atualizada com sucesso`);
                        editandoIndiceOs = null;
                        formOS.reset();
                        linkTodasOs.click();
                    }
                }
                catch(err){
                    alert("Erro ao processar requisição")
                }
            } 
            else{
                try{
                    const resposta = await fetch('http://localhost:3000/os', {
                        method: 'POST',
                        headers:{
                            'Content-Type':'application/json'
                        },
                        body: JSON.stringify(dadosOS)
                    })
                    if(resposta.ok){
                        const resultado = await resposta.json()
                        alert(`A ordem de serviço do produto ${resultado.produto} foi salva.`)
                        formOS.reset()
                    }
                }
                catch (err){
                    alert(`Ocorreu um erro no servidor`)
                }      
            }
        });

        const formCliente = document.querySelector('#form-cliente')
        formCliente.addEventListener('submit', async (evento) => {
            evento.preventDefault()
            const nomeDigitado = document.querySelector('#nome').value.trim();
            const cpfDigitado = document.querySelector('#cpf').value;
            const descricaoDigitado = document.querySelector('#descricao').value;
            const telefoneDigitado = document.querySelector('#telefone').value;
            const enderecoDigitado = document.querySelector('#endereco').value;
            
            const cliente = {
                nome : nomeDigitado,
                cpf : cpfDigitado,
                descricao : descricaoDigitado,
                telefone : telefoneDigitado,
                endereco : enderecoDigitado
            }

            if(editandoIndiceCliente === null){
                try{
                    const resposta = await fetch('http://localhost:3000/cliente', {
                        method: 'POST',
                        headers: {
                            'Content-type': 'application/json'
                        },
                        body: JSON.stringify(cliente)
                    })
                    if(resposta.ok){
                        const clienteSalvo = await resposta.json()
                        alert(`O cliente ${clienteSalvo.nome} foi cadastrado com sucesso`)
                        linkClientes.click()
                        formCliente.reset();
                    }
                }
                catch(err){
                    console.log('Erro ao conectar com o servidor')
                }
            } else{
                try{
                    const resposta = await fetch(`http://localhost:3000/cliente/${editandoIndiceCliente}`, {
                        method: "PUT",
                        headers: {
                            'Content-Type' : 'application/json'
                        },
                        body: JSON.stringify(cliente)
                    })
                    if(resposta.ok){
                        alert(`O cliente ${cliente.nome} foi atualizado com sucesso`)
                        editandoIndiceCliente = null
                        linkClientes.click()
                        formCliente.reset()
                    }
                }
                catch(err){
                    alert('Não foi possível se comunicar com o servidor')
                }
            }
        });

        const buttonMenu = document.querySelector('#menuButton');
        const sidebar= document.querySelector('#sidebar');
        buttonMenu.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });

        const btnSubmenuOs = document.querySelector('#btn-submenu-os');
        const submenuOS = document.querySelector('#submenu-os');
        btnSubmenuOs.addEventListener('click', (e) => {
            e.preventDefault(); // Impede a página de pular
            if (submenuOS.style.display === 'none') {
                submenuOS.style.display = 'block';
                btnSubmenuOs.querySelector('span').innerText = '▲';
            } else {
                submenuOS.style.display = 'none';
                btnSubmenuOs.querySelector('span').innerText = '▼';
            }
        });

        const btnSubmenuCliente = document.querySelector('#btn-submenu-clientes');
        const submenuCliente = document.querySelector('#submenu-clientes');
        btnSubmenuCliente.addEventListener('click', (e) => {
            e.preventDefault(); // Impede a página de pular
            if (submenuCliente.style.display === 'none') {
                submenuCliente.style.display = 'block';
                btnSubmenuCliente.querySelector('span').innerText = '▲';
            } else {
                submenuCliente.style.display = 'none';
                btnSubmenuCliente.querySelector('span').innerText = '▼';
            }
        });

        // Fechar a sidebar ao clicar em qualquer link de dentro dela
        document.querySelectorAll('.sidebar a').forEach(link => {
            link.addEventListener('click', () => {
                // Se não for o botão do submenu, fecha a barra
                if(link.id !== 'btn-submenu-os' && link.id !== 'btn-submenu-clientes') {
                    sidebar.classList.remove('active');
                }
            });
        });

        const opcoesExibicao1= document.querySelector('#select-opcoes-exibicao');
        opcoesExibicao1.addEventListener('change', () => {
            renderizarOs();
        })

        const opcoesExibicao2 = document.querySelector('#select-opcoes-2');
        opcoesExibicao2.addEventListener('change', () => {
            renderizarOs();
        })

        const linkOS = document.querySelector('#link-os');
        linkOS.addEventListener('click', () => {
            editandoIndiceOs = null;
            formOS.reset();
            document.querySelectorAll('section').forEach(pag => pag.style.display = "none");
            document.querySelector('#tela-os').style.display = "block";
            exibirClientes();
        });

        const linkTodasOs = document.querySelector('#link-todas-os');
        linkTodasOs.addEventListener('click', () => {
            document.querySelectorAll('section').forEach(pag => pag.style.display = "none");
            document.querySelector('#tela-todas-os').style.display = "block";
            renderizarOs();
        });

        const linkCadastro = document.querySelector('#link-cadastro');
        linkCadastro.addEventListener('click', () => {
            document.querySelectorAll('section').forEach(pag => pag.style.display = "none")
            document.querySelector('#tela-cadastro').style.display = 'block';

        });

        const linkClientes = document.querySelector('#link-clientes');
        linkClientes.addEventListener('click', () => {
            document.querySelectorAll('section').forEach(pag => pag.style.display = "none")
            document.querySelector('#tela-lista-clientes').style.display = 'block';
            renderizarClientes();
        });
        
        const linkPrincipal = document.querySelector('#link-principal');
        linkPrincipal.addEventListener('click', () => {
            document.querySelectorAll('section').forEach(pag => pag.style.display = "none")
            document.querySelector('#tela-principal').style.display = 'block';
        });


        /*  ////////////SEÇÃO PARA AS FUNÇÕES //////////////*/

        async function renderizarClientes() {
            const container = document.querySelector('#container-clientes');
            container.innerHTML = "";

            try{
                const resposta = await fetch('http://localhost:3000/cliente');
                if(resposta.ok){
                    const clientes = await resposta.json()
                    if (clientes.length === 0) {
                        const aviso = document.createElement('div');
                        aviso.classList.add('div-aviso');
                        aviso.innerHTML = `<h3>Não há clientes cadastrados</h3>`;
                        container.appendChild(aviso);
                        return;
                    }

                    clientes.forEach((cliente) => {
                        const cartao = document.createElement('div');
                        cartao.classList.add('card-cliente');

                        cartao.innerHTML = `
                            <h3>${cliente.nome}</h3>
                            <p>CPF: ${cliente.cpf}</p>
                            <p>Tel: ${cliente.telefone}</p>
                            <div class="div-buttons-card">
                                <button class='btn btn-delete' onclick="excluirCliente('${cliente._id}')">Excluir</button>
                                <button class="btn btn-neutral" onclick="verHistorico('${cliente.nome}')">Histórico</button>
                                <button class="btn btn-edit" onclick="editarCliente('${cliente._id}')">Editar</button>
                            </div>
                        `;
                        container.appendChild(cartao);
                    });
                }
            }
            catch(err){
                console.log("Erro ao conectar com o servidor")
            }
        };

        let editandoIndiceCliente = null;
        async function editarCliente(id){
            try{
                const resposta = await fetch('http://localhost:3000/cliente')
                if(resposta.ok){
                    const listaClientes = await resposta.json()
                    const cliente = listaClientes.find(item => item._id === id)
                    if(cliente)  {
                        document.querySelector('#nome').value = cliente.nome
                        document.querySelector('#descricao').value = cliente.descricao
                        document.querySelector('#cpf').value = cliente.cpf
                        document.querySelector('#telefone').value = cliente.telefone
                        document.querySelector('#endereco').value = cliente.endereco

                        document.querySelectorAll('section').forEach(pag => pag.style.display = "none");
                        document.querySelector('#tela-cadastro').style.display = "block"

                        editandoIndiceCliente = id
                    } else{
                        alert('ERRO: Não existe cliente com este id')
                    }
                } else{
                    alert('Erro: Não foi possível pegar os dados do cliente na api de clientes')
                }
            }
            catch(err){
                alert('Não foi possivel pegar os dados do servidor')
                console.log('Erro no try')
            }
        }

        async function renderizarOs() {
            const criterio1 = document.querySelector('#select-opcoes-exibicao').value;
            const criterio2 = document.querySelector('#select-opcoes-2').value;
            const containerListaOs = document.querySelector('#container-todas-os');
            containerListaOs.innerHTML = ""
            
            try{
                const resposta= await fetch('http://localhost:3000/os')
                if(resposta.ok){
                    const listaOS = await resposta.json()
                    listaOsFiltrada = listaOS.filter(os => {
                        if (criterio1 === "todas"){
                            return true
                        } else{
                            return os.status === criterio1;
                        }
                    });
                    if(listaOsFiltrada.length === 0) {
                        const aviso = document.createElement('div');
                        aviso.classList.add('div-aviso');
                        aviso.innerHTML = `<h3>Não há ordens de serviço com o status escolhido</h3>`
                        containerListaOs.appendChild(aviso)
                        return
                    };

                    listaOsFiltrada.sort((a,b) => {
                        dataRecebimentoA = new Date(a.dataRecebimento);
                        dataEntregaA = new Date(a.dataEntrega);
                        dataRecebimentoB = new Date(b.dataRecebimento);
                        dataEntregaB = new Date(b.dataEntrega);

                        if (criterio2 === "nova"){
                            return dataRecebimentoB - dataRecebimentoA;
                        }
                        if (criterio2 ==="velha"){
                            return dataRecebimentoA - dataRecebimentoB;
                        }
                        if (criterio2 ==="prazo"){
                            return dataEntregaA - dataEntregaB;
                        }
                    })

                    listaOsFiltrada.forEach((os) => {
                        const divOS = document.createElement('div');
                        divOS.classList.add('div-os')
                        divOS.innerHTML = `s
                            <h1 style="color: #00b900; margin-bottom: 10px;">${os.produto}</h1>
                            <p><strong>Cliente:</strong> ${os.cliente}</p>
                            <p><strong>Valor:</strong> R$ ${os.valor}</p>
                            <div class="div-buttons-card">
                                <button class="btn btn-delete" onclick="excluirOs('${os._id}')">Excluir</button>
                                <button class="btn btn-edit" onclick="editarOs('${os._id}')">Editar</button>
                            </div>
                        `;
                        containerListaOs.appendChild(divOS);
                    });
                }
            }
            catch (err){
                console.log('Erro ao carregar as ordens de serviço', err);
            }
        };

        let editandoIndiceOs = null;
        async function editarOs(id){
            document.querySelectorAll('section').forEach(pag => pag.style.display = "none");
            document.querySelector('#tela-os').style.display = "block";

            exibirClientes();

            try{
                const resposta = await fetch('http://localhost:3000/os');
                const listaOS = await resposta.json();
                const os = listaOS.find(item => item._id === id);
                
                if(os){
                    document.querySelector('#select-status-os').value = os.status;
                    document.querySelector('#select-clientes').value = os.cliente;
                    document.querySelector('#produto').value = os.produto;
                    document.querySelector('#observacao').value = os.observacao;
                    document.querySelector('#relato').value = os.relato;
                    document.querySelector('#laudo').value = os.laudo;
                    document.querySelector('#valor').value = os.valor;

                    if(os.dataRecebimento) document.querySelector('#data-recebimento').value = os.dataRecebimento.split('T')[0];
                    if(os.dataEntrega) document.querySelector('#data-entrega').value = os.dataEntrega.split('T')[0];

                    editandoIndiceOs = id;
                }
            }
            catch(err){
                alert('Erro ao carregar dados da OS')
            }
        }

        async function excluirCliente(id) {
            if(!confirm('Tem certeza de que deseja excliuir este cliente?')){return}
            try{
                const resposta = await fetch(`http://localhost:3000/cliente/${id}`, {
                    method: 'DELETE'
                })
                if (resposta.ok){
                    alert('Cliente excluído com sucesso')
                    linkClientes.click()
                } else{
                    const erro = resposta.json()
                    alert(`Erro: ${erro.message}`)
                }
            }            
            catch(err){
                console.error("Erro ao conectar com o servidor:", err);
                alert('Não foi possível se conectar ao servidor')
            }
        }

        async function excluirOs(id){
            if(!confirm("Tem certeza de que deseja excluir?")){return};
            try{
                const resposta = await fetch(`http://localhost:3000/os/${id}`, {
                    method:'DELETE'
                })
                if(resposta.ok){
                    alert("OS deletada com sucesso")
                    renderizarOs()
                } else{
                    const erro = await resposta.json()
                    alert(`Erro ${erro.message}`)
                }
            }
            catch(err){
                console.error("Erro ao conectar com o servidor:", err);
                alert('Não foi possível se conectar ao servidor')
            }
        }

        const inputBusca = document.querySelector('#barra-busca');
        inputBusca.addEventListener('input', async () => {
            try{
                const resposta = await fetch('http://localhost:3000/cliente')
                if(resposta.ok){
                    const todosClientes = await resposta.json()
                    const valorBusca = inputBusca.value.toLowerCase();
                    const clientesFiltrados = todosClientes.filter(cliente => {
                        return cliente.nome.toLowerCase().includes(valorBusca);
                    })
                    renderizarClientesFiltrados(clientesFiltrados);
                } else{
                    const erro = resposta.json()
                    console.log(`Erro no fetch para api de clientes: ${erro}`)
                }
            }
            catch(err){
                alert('Erro ao fazer busca no servidor')
                console.log('Erro no try')
            }
        })

        function renderizarClientesFiltrados(clientesFiltrados) {
            containerClientes = document.querySelector('#container-clientes');
            containerClientes.innerHTML = "";

            clientesFiltrados.forEach((cliente, index) => {
                const cartao = document.createElement('div');
                cartao.classList.add('card-cliente');
                cartao.innerHTML = `
                <h3>${cliente.nome}</h3>
                <p>CPF: ${cliente.cpf}</p>
                <p>Tel: ${cliente.telefone}</p>
                <button class="btn btn-delete" onclick="excluirCliente(${index})">Excluir</button>
                <button class="btn btn-neutral" onclick="verHistorico('${cliente.nome}')">Histórico de OS</button>
                `;
                containerClientes.appendChild(cartao);
            });
        };

        async function exibirClientes() {
            const select = document.querySelector('#select-clientes');
            select.innerHTML = '<option value="">Selecione um cliente</option>'
            try{
                const resposta = await fetch('http://localhost:3000/cliente')
                if(resposta.ok){
                    const clientes = await resposta.json()
                    clientes.forEach(cliente => {
                        const option = document.createElement('option');
                        option.value = cliente.nome;
                        option.textContent = cliente.nome;
                        select.appendChild(option);
                    })  
                }
            }
            catch(err){
                alert('Erro ao carregar lista de nomes')
            }
        };

        async function verHistorico(nomeCliente) {
            document.querySelectorAll('section').forEach(s => s.style.display = 'none');
            document.querySelector('#tela-historico').style.display = 'block';

            document.querySelector('#titulo-historico').innerText = `Serviços: ${nomeCliente}`;

            try{
                const resposta = await fetch('http://localhost:3000/os')
                if(resposta.ok){
                    const todasOS = await resposta.json()
                    const historicofiltrado = todasOS.filter(os => os.cliente === nomeCliente);

                    const container = document.querySelector('#container-historico');
                    container.innerHTML = "";

                    if (historicofiltrado.length === 0) {
                        const div = document.createElement('div');
                        div.classList.add('div-central');
                        div.innerHTML = "Este cliente não possui histórico de OS";
                        return;
                    }

                    historicofiltrado.forEach(os => {
                        const itemOS = document.createElement('div');
                        itemOS.classList.add('div-os');
                        itemOS.innerHTML = `
                        <p>Produto: ${os.produto}</p>
                        <p>Observação: ${os.observacao}</p>
                        <p>relato do cliente : ${os.relato}</p>
                        <p>Laudo técnico: ${os.laudo}</p>
                        <p>Valor a cobrar: ${os.valor}</p>
                        `;
                        container.appendChild(itemOS)
                    });                                     
                }
            }
            catch(err){
                console.log('erro ao se conectar com o servidor')
                alert("Erro ao se conectar com o servidor")
            }
        };

        function voltarParaClientes() {
            document.querySelector('#tela-historico').style.display = 'none';
            document.querySelector('#tela-lista-clientes').style.display = 'block';
        };
    </script>
</body>
</html>
